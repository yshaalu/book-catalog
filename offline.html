<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: #f5f0eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #2c1810;
        }
        .container {
            max-width: 400px;
            padding: 40px;
        }
        .container h1 { font-size: 48px; margin: 0; }
        .container p { color: #6b4c3a; font-size: 18px; }
        .container a {
            display: inline-block;
            margin-top: 20px;
            color: #c9a87c;
            text-decoration: none;
            border: 2px solid #c9a87c;
            padding: 10px 30px;
            border-radius: 30px;
        }
        .container a:hover {
            background: #c9a87c;
            color: #2c1810;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚</h1>
        <h2>Нет соединения</h2>
        <p>Пожалуйста, проверьте интернет-соединение</p>
        <a href="/book-catalog/">Попробовать снова</a>
    </div>
</body>
</html>
